pre-commit:
  commands:
    prettier:
      glob: '*.{ts,tsx,js,jsx,json,css,md}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit
    lint:
      run: npm run lint
    # unit-test: vitest 도입 후 활성화
    #   run: npm run test -- --run

pre-push:
  commands:
    no-direct-main-push:
      run: |
        branch=$(git symbolic-ref HEAD 2>/dev/null | sed 's|refs/heads/||')
        if [ "$branch" = "main" ]; then
          echo "❌ main 브랜치 직접 push 금지. 기능 브랜치 → PR을 사용하세요."
          exit 1
        fi
    # e2e: Playwright 도입 후 활성화
    #   run: npx playwright test
